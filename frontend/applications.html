<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Applications - PDMS</title>
    <link rel="stylesheet" href="css/autocomplete.css">
    <link rel="stylesheet" href="css/applications.css">
</head>

<body>

<div class="layout">

<aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <div class="logo-circle">P</div>
        <h2 class="logo-text">PDMS</h2>
    </div>

    <p class="nav-title">Navigation</p>

    <ul>
        <li onclick="navigate('dashboard')">🏠 Dashboard</li>
        <li onclick="navigate('students')">🎓 Students</li>
        <li onclick="navigate('companies')">🏢 Companies</li>
        <li onclick="navigate('drives')">📅 Drives</li>
        <li class="active">📄 Applications</li>
        <li onclick="navigate('results')">🎯 Results</li>
    </ul>
</aside>

<main class="main" id="main">

    <div class="topbar">
        <div class="left">
            <span class="menu-btn" onclick="toggleSidebar()">☰</span>
            <span class="title">PDMS</span>
        </div>
        <a href="index.html" class="home-btn">← Home</a>
    </div>

    <div class="content">
        <h1>Applications</h1>
        <p class="subtitle">Choose a drive first; only eligible students can apply</p>

        <div class="add-box apply-form-box">
            <h2>Apply for drive</h2>

            <div class="apply-form-inner">
                <div class="combo-field apply-drive-field">
                    <label class="combo-label" for="driveComboInput">1. Placement drive</label>
                    <div class="combo" id="driveCombo">
                        <input type="text" class="combo-input" id="driveComboInput" autocomplete="off" placeholder="Type to search by company or role…" />
                        <input type="hidden" class="combo-value" value="" />
                        <ul class="combo-list hidden" role="listbox"></ul>
                    </div>
                </div>

                <p id="eligibleInfo" class="info-text apply-eligible-line" aria-live="polite"></p>

                <div class="apply-student-block hidden" id="studentRow">
                    <label class="combo-label" for="studentComboInput">2. Student (eligible for this drive)</label>
                    <div class="apply-student-row">
                        <div class="combo combo-block" id="studentCombo">
                            <input type="text" class="combo-input" id="studentComboInput" autocomplete="off" placeholder="Search by name or registration no…" />
                            <input type="hidden" class="combo-value" value="" />
                            <ul class="combo-list hidden" role="listbox"></ul>
                        </div>
                        <button type="button" class="add-btn apply-submit-btn" onclick="applyToDrive()">Apply</button>
                    </div>
                </div>
            </div>

            <p id="message" class="msg-line apply-msg" role="status"></p>
        </div>

        <div class="table-container applications-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Drive</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <footer class="footer">
        Placement Drive Management System — DBMS Project
    </footer>

</main>
</div>

<script src="js/data.js"></script>
<script src="js/script.js"></script>
<script src="js/autocomplete.js"></script>
<script src="js/applications.js"></script>

</body>
</html>
